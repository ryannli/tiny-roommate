<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }

  #bubble {
    position: fixed;
    max-width: min(280px, calc(100vw - 24px));
    min-width: 140px;
    padding: 10px 16px;
    background: linear-gradient(145deg, #fffaf3 0%, #fff2ec 50%, #ffe8ef 100%);
    border-radius: 16px;
    font: 14px/1.5 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
    font-weight: 500;
    color: #3d2b22;
    box-shadow:
      0 4px 16px rgba(180, 100, 60, 0.15),
      0 0 0 1.5px rgba(220, 150, 110, 0.2),
      inset 0 1px 0 rgba(255,255,255,0.95);
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 50;
    text-align: left;
    word-wrap: break-word;
    letter-spacing: 0.01em;
    transform: scale(0.85);
  }
  #bubble.show { opacity: 1; transform: scale(1); }
  .bubble-quote {
    font-size: 11px;
    color: rgba(100, 75, 60, 0.4);
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(200, 160, 120, 0.12);
    line-height: 1.4;
  }
  #bubble-actions { display: flex; align-items: center; margin-top: 8px; gap: 6px; }
  #bubble-reactions { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  #bubble-reactions:empty { display: none; }
  #bubble-reactions button {
    padding: 4px 10px;
    border: 1px solid rgba(200, 140, 100, 0.25);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.7);
    color: #5a3d2e;
    font: 12px/1 'SF Pro Rounded', system-ui, sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
    pointer-events: auto;
  }
  #bubble-reactions button:hover { background: rgba(255, 200, 150, 0.4); border-color: rgba(200, 140, 100, 0.5); }
  #bubble-reply {
    margin-left: auto;
    padding: 2px 6px;
    border: none; border-radius: 8px;
    background: transparent;
    color: rgba(100, 75, 60, 0.3);
    font: 13px/1 'SF Pro Rounded', system-ui, sans-serif;
    cursor: pointer; transition: all 0.15s ease;
    pointer-events: auto; flex-shrink: 0;
  }
  #bubble-reply:hover { color: rgba(100, 75, 60, 0.7); background: rgba(200, 140, 100, 0.1); }
  #bubble .arrow {
    position: absolute;
    width: 10px; height: 10px;
    background: #fff6f1;
    transform: rotate(45deg);
    box-shadow: 2px 2px 2px rgba(200, 130, 80, 0.06);
  }

  #pet {
    display: block;
    cursor: url('/cursor-hand.svg') 28 28, pointer;
  }

  #pet-hand {
    position: fixed;
    width: 64px; height: 64px;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s ease;
    transform-origin: 50% 80%;
  }
  #pet-hand.active {
    opacity: 1;
    animation: pet-rock 0.3s ease-in-out infinite alternate;
  }
  @keyframes pet-rock {
    0% { transform: rotate(-8deg) scale(1); }
    100% { transform: rotate(8deg) scale(1.05); }
  }

  #pet-status {
    position: fixed;
    right: 8px; top: 4px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    z-index: 50;
  }
  #together {
    font: 11px/1 'SF Pro Rounded', system-ui, sans-serif;
    color: rgba(150, 110, 80, 0.6);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  #hearts { display: flex; gap: 1px; }
  .heart-wrap { position: relative; width: 18px; height: 18px; font-size: 16px; line-height: 18px; display: inline-block; }
  .heart-bg { position: absolute; top: 0; left: 0; filter: grayscale(1); opacity: 0.25; }
  .heart-fill { position: absolute; top: 0; left: 0; overflow: hidden; }
  .provider-options {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .provider-option {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 14px 16px;
    border: 1.5px solid rgba(200, 160, 120, 0.25);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.68);
    color: #4a3830;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .provider-option:hover {
    background: rgba(255, 239, 223, 0.7);
    border-color: rgba(220, 150, 110, 0.45);
  }
  .provider-option.active {
    border-color: rgba(220, 150, 110, 0.55);
    background: rgba(255, 230, 200, 0.4);
    box-shadow: inset 0 0 0 1px rgba(220, 150, 110, 0.18);
  }
  .provider-option strong {
    font: 600 13px/1.2 'SF Pro Rounded', system-ui, sans-serif;
  }
  .provider-option span {
    font: 12px/1.45 'SF Pro Rounded', system-ui, sans-serif;
    color: rgba(90, 65, 50, 0.72);
  }
  .settings-help {
    margin-top: 8px;
    font: 12px/1.45 'SF Pro Rounded', system-ui, sans-serif;
    color: rgba(100, 75, 60, 0.68);
  }
  #provider-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(70, 48, 34, 0.24);
    backdrop-filter: blur(8px);
    z-index: 2600;
  }
  #provider-overlay.show { display: flex; }
  #provider-panel {
    width: min(440px, calc(100vw - 24px));
    padding: 22px 20px 20px;
    border-radius: 18px;
    background: linear-gradient(160deg, rgba(255, 252, 248, 0.98), rgba(255, 242, 233, 0.98));
    border: 1px solid rgba(200, 160, 120, 0.22);
    box-shadow: 0 18px 48px rgba(70, 45, 28, 0.22);
  }
  #provider-panel h2 {
    font: 600 18px/1.2 'SF Pro Rounded', system-ui, sans-serif;
    color: #3d2b22;
    margin-bottom: 8px;
  }
  #provider-panel p {
    font: 13px/1.5 'SF Pro Rounded', system-ui, sans-serif;
    color: rgba(100, 75, 60, 0.76);
    margin-bottom: 16px;
  }
  @media (max-width: 520px) {
    .provider-options {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div id="pet-status">
  <div id="together"></div>
  <div id="hearts"></div>
</div>
<div id="bubble">
  <span id="bubble-text"></span>
  <div id="bubble-actions">
    <div id="bubble-reactions"></div>
    <button id="bubble-reply" title="Reply">↩</button>
  </div>
  <div class="arrow" id="bubble-arrow"></div>
</div>
<canvas id="pet"></canvas>
<img id="pet-hand" src="/cursor-hand.svg" />
<div id="provider-overlay">
  <div id="provider-panel">
    <h2>Choose Your AI Provider</h2>
    <p>Pick the CLI this pet should use for thinking, screen understanding, and chat. This is saved, and you can change it later in Settings.</p>
    <div class="provider-options" id="startup-ai-provider-options"></div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
